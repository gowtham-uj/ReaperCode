# OMP custom provider config.
# Loaded by ModelRegistry from <PI_CODING_AGENT_DIR>/models.yml.
# See https://github.com/can1357/oh-my-pi/blob/main/docs/models.md
providers:
  nuralwatt:
    name: Nural Watt
    baseUrl: https://api.nuralwatt.com/v1
    api: openai-completions
    apiKey: NURALWATT_API_KEY
    authHeader: true
    models:
      - id: glm-5.2
        name: GLM 5.2
        contextWindow: 1024000
        maxTokens: 16384
        input: [text]
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
      - id: kimi-k2.6
        name: Kimi K2.6
        contextWindow: 256000
        maxTokens: 16384
        input: [text, image]
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
      - id: kimi-k2.7-code
        name: Kimi K2.7 Code
        contextWindow: 256000
        maxTokens: 16384
        input: [text, image]
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
